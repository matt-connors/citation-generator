name: publish scheduled guides

on:
  schedule:
    # Weekly check; guide pubDate values create the every-other-week cadence.
    - cron: '17 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run content:publish-due
      - name: Commit deploy trigger when a guide is due
        run: |
          if [ -z "$(git status --porcelain -- public/content-publish-trigger.json)" ]; then
            echo "No scheduled guides are due."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content-publish-trigger.json
          git commit -m "Publish scheduled guide"
          git push
